<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DO IT</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══ TOKENS ══════════════════════════════════════════ */
:root{--font:'Pretendard','Apple SD Gothic Neo',sans-serif;--r:12px;--rs:8px;--tr:all .15s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--bg4:#2a2a2a;--bg5:#333;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.2);
  --t:#f0f0f0;--t2:#666;--t3:#303030;--t4:#999;--tmuted:#aaa;
  --ac:#b8ff00;--ac2:rgba(184,255,0,.15);--ac3:rgba(184,255,0,.07);
  --rd:#f43f5e;--rd2:rgba(244,63,94,.15);
  --bl:#60a5fa;--bl2:rgba(96,165,250,.13);
  --yl:#facc15;--yl2:rgba(250,204,21,.13);
  --gr:#34d399;--gr2:rgba(52,211,153,.13);
  --sh:0 8px 32px rgba(0,0,0,.65);--sh2:0 3px 14px rgba(0,0,0,.45);
  --pop:#1e1e1e;--card:#1e1e1e;
  --ev-text:#f0f0f0;
}
[data-theme="light"]{
  --bg:#f0f4fc;--bg2:#fff;--bg3:#f5f7fd;--bg4:#eaecf8;--bg5:#dde1f5;
  --b:rgba(37,99,235,.08);--b2:rgba(37,99,235,.15);--b3:rgba(37,99,235,.28);
  --t:#1a1f3c;--t2:#8892b8;--t3:#d0d4ec;--t4:#5a64a0;--tmuted:#6b74a8;
  --ac:#2563eb;--ac2:rgba(37,99,235,.12);--ac3:rgba(37,99,235,.05);
  --rd:#e11d48;--rd2:rgba(225,29,72,.1);
  --bl:#2563eb;--bl2:rgba(37,99,235,.12);
  --yl:#d97706;--yl2:rgba(217,119,6,.1);
  --gr:#059669;--gr2:rgba(5,150,105,.1);
  --sh:0 8px 32px rgba(37,99,235,.12);--sh2:0 3px 14px rgba(37,99,235,.09);
  --pop:#fff;--card:#fff;
  --ev-text:#1a1f3c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}
.app{display:flex;height:100vh}

/* ══ SIDEBAR ══════════════════════════════════════════ */
.sb{width:212px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);border-right:1px solid var(--b)}
.logo-row{padding:16px 14px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b)}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.logo-text{font-size:19px;font-weight:900;letter-spacing:-.5px;font-style:italic;font-family:var(--font);transform:skewX(-6deg);display:inline-block;color:var(--t)}
.logo-text .it{color:var(--ac)}
.logo-sub{font-size:9px;color:var(--t2);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-top:1px}
.thbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--b2);background:var(--bg3);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr);flex-shrink:0;margin-left:auto}
.thbtn:hover{color:var(--t)}
.nav-body{flex:1;overflow-y:auto;padding:6px 0}
.ns{padding:14px 13px 4px;font-size:9px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;font-weight:800}
.ni{display:flex;align-items:center;gap:8px;padding:7px 13px;font-size:13px;color:var(--t2);cursor:pointer;border-left:2.5px solid transparent;transition:var(--tr);user-select:none;border-radius:0 8px 8px 0;margin-right:8px;font-weight:500}
.ni:hover{color:var(--t);background:var(--bg3)}
.ni.on{color:var(--ac);border-left-color:var(--ac);background:var(--ac3);font-weight:700}
.ni .ico{width:16px;text-align:center;flex-shrink:0;font-size:14px}
.nbadge{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--t2);border-radius:20px;padding:1px 7px;font-weight:700}
.ni.on .nbadge{background:var(--ac);color:#000}
.fl{padding:2px 7px}
.fi{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:8px;font-size:12px;color:var(--t2);cursor:pointer;transition:var(--tr);font-weight:500}
.fi:hover{background:var(--bg3);color:var(--t)}
.fi.on{background:var(--bg4);color:var(--t);font-weight:700}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fcnt{margin-left:auto;font-size:10px;color:var(--t3);font-weight:700}
.feb{opacity:0;font-size:11px;color:var(--t3);padding:1px 4px;cursor:pointer;transition:var(--tr);border-radius:4px}
.fi:hover .feb{opacity:1}
.feb:hover{color:var(--t2);background:var(--b2)}
.sbfoot{padding:8px 11px;border-top:1px solid var(--b);display:flex;flex-direction:column;gap:2px}
.sba{font-size:12px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 7px;border-radius:7px;transition:var(--tr);font-weight:500}
.sba:hover{background:var(--bg3);color:var(--t)}

/* ══ MAIN ════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 22px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2)}
.ptitle{font-size:18px;font-weight:800;letter-spacing:-.2px;color:var(--t);flex:1}
.btn{padding:7px 16px;border-radius:22px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);border:1px solid var(--b2);background:var(--bg3);color:var(--t2);transition:var(--tr);white-space:nowrap}
.btn:hover{color:var(--t);border-color:var(--b3);background:var(--bg4)}
.btn.primary{background:var(--ac);color:#000;border-color:var(--ac)}
.btn.primary:hover{opacity:.88}
.btn.sm{padding:4px 12px;font-size:11px}
.btn.danger{background:var(--rd2);color:var(--rd);border-color:var(--rd2)}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ══ TASK 3-PANE ════════════════════════════════════ */
.task3{display:grid;grid-template-columns:1fr 300px;height:100%;overflow:hidden}
.list-pane{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--b)}
.detail-pane{background:var(--bg2);overflow-y:auto;display:flex;flex-direction:column}
.qabar{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--b);flex-shrink:0}
.qa-inp{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--t);font-family:var(--font)}
.qa-inp::placeholder{color:var(--t3)}
.tlist{flex:1;overflow-y:auto;padding:12px 14px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:11px;text-align:center}
.sc-n{font-size:26px;font-weight:900;color:var(--ac);line-height:1}
.sc-l{font-size:9px;color:var(--t2);margin-top:2px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.tgrp{margin-bottom:14px}
.tgrp-hd{display:flex;align-items:center;gap:7px;padding:4px 6px;cursor:pointer;user-select:none;border-radius:7px;transition:var(--tr)}
.tgrp-hd:hover{background:var(--bg3)}
.tgarr{font-size:9px;color:var(--t2);transition:transform .14s;width:14px;text-align:center}
.tgarr.open{transform:rotate(90deg)}
.tgname{font-size:10px;font-weight:800;color:var(--t4);letter-spacing:.5px;text-transform:uppercase}
.tgcnt{font-size:10px;color:var(--t2);font-weight:700}

/* TASK ROW — solid folder color bg */
.tr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:var(--tr);margin-bottom:3px;animation:fu .16s ease both;position:relative;overflow:hidden}
.tr::before{content:'';position:absolute;inset:0;background:var(--row-bg,var(--bg3));z-index:0;border-radius:9px}
.tr>*{position:relative;z-index:1}
.tr:hover::before{filter:brightness(1.1)}
.tr.sel::before{filter:brightness(1.18)}
.tr.done-r .tr-text{text-decoration:line-through}
.tr.done-r{opacity:.42}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.tr-cb{width:17px;height:17px;border-radius:4px;border:1.5px solid rgba(255,255,255,.3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:var(--tr);background:rgba(0,0,0,.15);font-weight:800}
.tr-cb:hover{border-color:rgba(255,255,255,.6)}
.tr-cb.ck{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5)}
.tr-pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tr-body{flex:1;min-width:0}
.tr-text{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;align-items:center}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap;background:rgba(0,0,0,.15)}
.tr-dl{font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;opacity:.75}

/* DETAIL PANE */
.dp-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t3)}
.dp-hd{padding:18px 20px 13px;border-bottom:1px solid var(--b);flex-shrink:0}
.dp-title{width:100%;background:none;border:none;outline:none;font-size:16px;font-weight:700;color:var(--t);font-family:var(--font);line-height:1.4}
.dp-title::placeholder{color:var(--t3)}
.dp-scroll{flex:1;overflow-y:auto;padding:14px 18px}
.dp-sec{margin-bottom:14px}
.dp-sec-t{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.dp-field{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:9px;background:var(--bg3);border:1px solid var(--b);margin-bottom:4px;cursor:pointer;transition:var(--tr);position:relative}
.dp-field:hover{border-color:var(--b2)}
.dp-field:focus-within{border-color:var(--ac)}
.dp-f-ico{font-size:13px;flex-shrink:0;width:16px;text-align:center;color:var(--t2)}
.dp-f-lbl{font-size:10px;font-weight:700;color:var(--t2);width:44px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.dp-f-val{flex:1;font-size:13px;color:var(--t)}
.dp-f-val.ph{color:var(--t3)}
.dp-sel{width:100%;background:none;border:none;outline:none;font-size:13px;color:var(--t);font-family:var(--font);cursor:pointer}
.dp-notes{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--t);font-family:var(--font);resize:none;min-height:68px;line-height:1.6;outline:none;transition:border-color .14s;font-weight:400}
.dp-notes:focus{border-color:var(--ac)}
.dp-notes::placeholder{color:var(--t3)}
.dp-footer{padding:11px 18px;border-top:1px solid var(--b);display:flex;gap:7px;align-items:center;flex-shrink:0}
.pill-row{display:flex;gap:4px;flex-wrap:wrap}
.pp{padding:4px 11px;border-radius:20px;font-size:11px;border:1px solid var(--b);background:none;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:700;transition:var(--tr)}
.pp:hover{border-color:var(--b2);color:var(--t)}
.pp.on{font-weight:800}
.pp.p1.on{background:var(--rd2);color:var(--rd);border-color:var(--rd)}
.pp.p2.on{background:var(--yl2);color:var(--yl);border-color:var(--yl)}
.pp.p3.on{background:var(--bg4);color:var(--t4);border-color:var(--b3)}
.pp.p0.on{background:var(--bg4);color:var(--t2);border-color:var(--b2)}
.wd-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.wd{padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid var(--b);background:none;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:700;transition:var(--tr)}
.wd.on{background:var(--ac);color:#000;border-color:var(--ac)}

/* TIME DROPDOWN */
.tdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:400;background:var(--pop);border:1px solid var(--b2);border-radius:11px;box-shadow:var(--sh2);overflow:hidden}
.tdrop-inner{max-height:200px;overflow-y:auto;padding:4px}
.tdi{padding:8px 14px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:space-between;transition:var(--tr)}
.tdi:hover{background:var(--bg4);color:var(--t)}
.tdi.act{color:var(--ac);font-weight:700}
.tdi.act::after{content:'✓';color:var(--ac)}

/* DATE PICKER */
.datepan{background:var(--pop);border:1px solid var(--b2);border-radius:11px;padding:13px;margin-top:4px;box-shadow:var(--sh2)}
.dp2-hd{display:flex;align-items:center;margin-bottom:8px}
.dp2-title{font-size:13px;font-weight:700;flex:1;text-align:center;color:var(--t)}
.dp2-nav{background:none;border:1px solid var(--b2);border-radius:6px;color:var(--t2);cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr)}
.dp2-nav:hover{color:var(--t);border-color:var(--b3)}
.dp2-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp2-dl{text-align:center;font-size:9px;color:var(--t3);padding:2px 0;font-weight:800;letter-spacing:.5px}
.dp2-d{text-align:center;font-size:12px;padding:5px 2px;border-radius:6px;cursor:pointer;color:var(--t2);transition:var(--tr);font-weight:600;line-height:1}
.dp2-d:hover:not(.e){background:var(--b2);color:var(--t)}
.dp2-d.t{color:var(--ac);font-weight:800}
.dp2-d.s{background:var(--ac)!important;color:#000!important;font-weight:800}
.dp2-d.rng{background:var(--ac2);color:var(--ac)}
.dp2-d.o{opacity:.3}.dp2-d.e{cursor:default}

/* ══ CALENDAR ════════════════════════════════════════ */
.calview{display:flex;flex-direction:column;height:100%;overflow:hidden}
.calctrl{display:flex;align-items:center;gap:7px;padding:10px 20px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2)}
.caltitle{font-size:15px;font-weight:800;flex:1}
.cnav{background:none;border:1px solid var(--b2);border-radius:8px;color:var(--t2);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:var(--tr)}
.cnav:hover{border-color:var(--b3);color:var(--t)}
.dcbtns{display:flex;gap:2px}
.dcb{padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid var(--b);background:none;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:700;transition:var(--tr)}
.dcb:hover:not(.on){color:var(--t)}
.dcb.on{background:var(--ac);color:#000;border-color:var(--ac)}
.wlayout{display:flex;flex:1;overflow:hidden}

/* Left sidebar: mini month + inbox */
.wleft{width:178px;flex-shrink:0;border-right:1px solid var(--b);display:flex;flex-direction:column;background:var(--bg2)}
.mini-cal{flex-shrink:0;padding:11px 10px 6px}
.mc-hd{display:flex;align-items:center;margin-bottom:6px}
.mc-title{font-size:11px;font-weight:800;flex:1;text-align:center;color:var(--t)}
.mc-nav{background:none;border:none;color:var(--t2);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;transition:var(--tr);font-family:var(--font)}
.mc-nav:hover{color:var(--t);background:var(--b2)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mc-dl{text-align:center;font-size:8px;color:var(--t3);padding:1px 0;font-weight:800}
.mc-d{text-align:center;font-size:10px;padding:4px 2px;border-radius:5px;cursor:pointer;color:var(--t2);transition:var(--tr);font-weight:600;line-height:1}
.mc-d:hover:not(.mc-e){background:var(--b2);color:var(--t)}
.mc-d.mc-t{color:var(--ac);font-weight:800}
.mc-d.mc-v{background:var(--ac3)}
.mc-d.mc-sel{background:var(--ac);color:#000;font-weight:800}
.mc-d.mc-rng{background:var(--ac2);color:var(--ac)}
.mc-d.mc-e{cursor:default}
.mc-dots{display:flex;gap:1px;justify-content:center;margin-top:1px}
.mc-dot{width:3px;height:3px;border-radius:50%}

/* inbox panel */
.inbox-panel{flex:1;overflow-y:auto;padding:8px 10px;border-top:1px solid var(--b)}
.inbox-hd{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.inbox-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-weight:800;flex:1}
.inbox-add{width:20px;height:20px;border-radius:6px;background:var(--ac);border:none;color:#000;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--font);transition:var(--tr)}
.inbox-add:hover{opacity:.85}
.ibi{padding:6px 8px;border-radius:8px;margin-bottom:3px;cursor:grab;transition:var(--tr);border:1px solid transparent;position:relative;overflow:hidden}
.ibi::before{content:'';position:absolute;inset:0;border-radius:8px;z-index:0}
.ibi>*{position:relative;z-index:1}
.ibi:hover{filter:brightness(1.1)}
.ibi.dragging{opacity:.2}
.ibi-text{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Week grid */
.wgwrap{flex:1;overflow:auto}
.wgrid{display:grid}
.wg-corner{background:var(--bg2);border-right:1px solid var(--b);border-bottom:1px solid var(--b);position:sticky;top:0;left:0;z-index:22;width:44px}
.wg-dhead{background:var(--bg2);border-right:1px solid var(--b);border-bottom:1px solid var(--b);padding:8px 4px;text-align:center;position:sticky;top:0;z-index:21;cursor:pointer;transition:var(--tr)}
.wg-dhead:hover{background:var(--bg3)}
.wg-dname{font-size:9px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;font-weight:800}
.wg-dnum{font-size:20px;font-weight:900;color:var(--t);line-height:1.1;margin-top:1px}
.wg-dnum.tnow{color:var(--ac)}
/* allday sticky row */
.wg-allday-label{width:44px;font-size:8px;color:var(--t2);letter-spacing:.5px;border-right:1px solid var(--b);border-bottom:1px solid var(--b);background:var(--bg2);position:sticky;left:0;top:57px;z-index:20;text-transform:uppercase;font-weight:800;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 5px 0 0;min-height:28px}
.wg-allday-cell{border-right:1px solid var(--b);border-bottom:1px solid var(--b);padding:3px;background:var(--bg2);min-height:28px;position:sticky;top:57px;z-index:19}
.wg-allday-cell.dover{background:var(--ac2)!important}
/* time rows */
.wg-tlabel{width:44px;height:48px;display:flex;align-items:flex-start;padding:4px 6px 0 0;justify-content:flex-end;font-size:9px;color:var(--t3);flex-shrink:0;position:sticky;left:0;background:var(--bg2);border-right:1px solid var(--b);z-index:8;border-bottom:1px solid var(--b);font-weight:700}
.wg-cell{height:48px;border-right:1px solid var(--b);border-bottom:1px solid var(--b);position:relative;cursor:pointer;transition:background .1s;user-select:none}
.wg-cell:hover{background:var(--ac3)}
.wg-cell.tcol{background:rgba(184,255,0,.012)}
[data-theme="light"] .wg-cell.tcol{background:rgba(37,99,235,.012)}
.wg-cell.dover{background:var(--ac2)!important}
.wg-cell.drag-sel{background:var(--ac2)!important}

/* allday chip */
.adchip{font-size:10px;padding:2px 7px;border-radius:5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;font-weight:700;transition:var(--tr)}
.adchip:hover{opacity:.82}
.adchip.done-c{text-decoration:line-through;opacity:.4}

/* timed event block */
.ev{position:absolute;border-radius:8px;padding:4px 7px;cursor:pointer;z-index:5;overflow:hidden;transition:box-shadow .12s,opacity .12s;border:none}
.ev:hover{z-index:6;box-shadow:0 4px 16px rgba(0,0,0,.28)}
.ev.dragging{opacity:.18}
.ev-time{font-size:9px;margin-bottom:1px;font-weight:700;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-txt{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.ev.done-e .ev-txt{text-decoration:line-through;opacity:.5}
.ev-rt{position:absolute;top:0;left:0;right:0;height:5px;cursor:n-resize;opacity:0;transition:opacity .12s;border-radius:8px 8px 0 0;background:rgba(0,0,0,.12)}
.ev-rb{position:absolute;bottom:0;left:0;right:0;height:6px;cursor:s-resize;opacity:0;transition:opacity .12s;border-radius:0 0 8px 8px;background:rgba(0,0,0,.12)}
.ev:hover .ev-rt,.ev:hover .ev-rb{opacity:1}
.nowline{position:absolute;left:0;right:0;height:2px;background:var(--rd);z-index:7;pointer-events:none;border-radius:1px}
.nowline::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--rd)}

/* ══ EVENT POPUP ══════════════════════════════════════ */
.epop{position:fixed;z-index:700;background:var(--pop);border:1px solid var(--b2);border-radius:15px;padding:0;width:316px;box-shadow:0 18px 54px rgba(0,0,0,.55);animation:pop .18s cubic-bezier(.34,1.56,.64,1);overflow:hidden;font-family:var(--font)}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.ep-hd{padding:13px 15px 9px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;gap:9px}
.ep-cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--b3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;transition:var(--tr);flex-shrink:0;margin-top:2px;background:none}
.ep-cb:hover{border-color:var(--ac)}
.ep-cb.ck{background:var(--ac);border-color:var(--ac);color:#000}
.ep-dt{font-size:11px;font-weight:700;margin-bottom:3px;color:var(--ac)}
.ep-title{font-size:15px;font-weight:700;color:var(--t);background:none;border:none;outline:none;font-family:var(--font);width:100%;line-height:1.3}
.ep-title::placeholder{color:var(--t3)}
.ep-close{background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;transition:var(--tr)}
.ep-close:hover{color:var(--t)}
.ep-body{padding:9px 15px;max-height:420px;overflow-y:auto}
.ep-sec{margin-bottom:10px}
.ep-sec-t{font-size:9px;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.ep-row{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--b);margin-bottom:3px;cursor:pointer;transition:var(--tr);position:relative}
.ep-row:hover{border-color:var(--b2)}
.ep-row:focus-within{border-color:var(--ac)}
.ep-lbl{font-size:9px;font-weight:800;color:var(--t2);width:38px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.ep-val{flex:1;font-size:12px;color:var(--t);font-family:var(--font)}
.ep-val.ph{color:var(--t3)}
.ep-sel{width:100%;background:none;border:none;outline:none;font-size:12px;color:var(--t);font-family:var(--font);cursor:pointer}
.ep-tdrop{position:absolute;top:calc(100%+3px);left:0;right:0;z-index:500;background:var(--pop);border:1px solid var(--b2);border-radius:9px;box-shadow:var(--sh2);overflow:hidden}
.ep-tdrop-inner{max-height:180px;overflow-y:auto;padding:3px}
.ep-tdi{padding:7px 13px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:space-between;transition:var(--tr)}
.ep-tdi:hover{background:var(--bg4);color:var(--t)}
.ep-tdi.act{color:var(--ac);font-weight:700}
.ep-tdi.act::after{content:'✓';color:var(--ac)}
.ep-notes{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--t);font-family:var(--font);resize:none;min-height:48px;line-height:1.5;outline:none;transition:border-color .14s;font-weight:400}
.ep-notes:focus{border-color:var(--ac)}
.ep-prow{display:flex;gap:4px;flex-wrap:wrap}
.ep-pp{padding:3px 10px;border-radius:18px;font-size:11px;border:1px solid var(--b);background:none;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:700;transition:var(--tr)}
.ep-pp:hover{border-color:var(--b2);color:var(--t)}
.ep-pp.on{font-weight:800}
.ep-pp.p1.on{background:var(--rd2);color:var(--rd);border-color:var(--rd)}
.ep-pp.p2.on{background:var(--yl2);color:var(--yl);border-color:var(--yl)}
.ep-pp.p3.on{background:var(--bg4);color:var(--t4);border-color:var(--b3)}
.ep-pp.p0.on{background:var(--bg4);color:var(--t2);border-color:var(--b2)}
.ep-ft{padding:9px 15px;border-top:1px solid var(--b);display:flex;gap:7px;align-items:center}
.ep-qshots{display:flex;gap:4px;flex-wrap:wrap;padding:4px 0}
.ep-qs{padding:3px 9px;border-radius:18px;font-size:10px;font-weight:700;background:var(--bg4);color:var(--t4);cursor:pointer;border:1px solid var(--b);transition:var(--tr)}
.ep-qs:hover{background:var(--ac);color:#000;border-color:var(--ac)}

/* ══ HABITS ══════════════════════════════════════════ */
.hview{padding:16px 22px;overflow-y:auto;flex:1}
.habar{display:flex;gap:8px;margin-bottom:16px}
.hinp{flex:1;background:var(--bg2);border:1px solid var(--b2);border-radius:24px;padding:9px 16px;font-size:13px;color:var(--t);font-family:var(--font);outline:none;transition:border-color .14s}
.hinp:focus{border-color:var(--ac)}
.hinp::placeholder{color:var(--t3)}
/* ACCORDION HABIT CARD */
.hcard{background:var(--card);border:1px solid var(--b);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:var(--tr)}
.hcard:hover{border-color:var(--b2)}
.hcard-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none}
.hcard-hd:hover{background:var(--bg3)}
.hcard-arrow{font-size:10px;color:var(--t2);transition:transform .15s;flex-shrink:0}
.hcard-arrow.open{transform:rotate(90deg)}
.hcard-name{flex:1;font-size:14px;font-weight:700;color:var(--t)}
.hcard-bar{flex:1;max-width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.hcard-bar-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.hcard-pct{font-size:12px;font-weight:800;color:var(--ac);margin-right:4px;min-width:32px;text-align:right}
.hcard-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;transition:var(--tr);padding:2px 4px;border-radius:4px}
.hcard-del:hover{color:var(--rd);background:var(--rd2)}
.hcard-body{padding:0 16px 14px;border-top:1px solid var(--b)}
.hcard-body.collapsed{display:none}
.hcdays{display:flex;gap:3px;flex-wrap:wrap;padding:10px 0 8px}
.hcday{font-size:10px;padding:3px 8px;border-radius:18px;border:1px solid var(--b);color:var(--t2);cursor:pointer;font-weight:700;transition:var(--tr)}
.hcday.on{background:var(--ac);color:#000;border-color:var(--ac)}
.hmnav{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hmtitle{font-size:11px;color:var(--t2);font-weight:700}
.hmbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:0 2px;transition:var(--tr)}
.hmbtn:hover{color:var(--t)}
.hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hgl{text-align:center;font-size:9px;color:var(--t3);padding-bottom:3px;letter-spacing:.5px;text-transform:uppercase;font-weight:800}
.hgd{aspect-ratio:1;border-radius:5px;background:var(--bg4);border:1px solid var(--b);cursor:pointer;transition:var(--tr)}
.hgd:hover:not(.hfut):not(.hemp){border-color:var(--ac)}
.hdone{background:var(--ac)!important;border-color:var(--ac)!important}
.htoday{border-color:var(--ac)!important;border-width:2px!important}
.hfut{opacity:.12;cursor:default}.hemp{background:transparent!important;border-color:transparent!important;cursor:default}

/* ══ JOURNAL ══════════════════════════════════════════ */
.jview{display:flex;flex-direction:column;height:100%;overflow:hidden}
.jheader{display:flex;align-items:center;gap:10px;padding:12px 22px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--bg2)}
.jdnav{background:none;border:1px solid var(--b2);border-radius:7px;color:var(--t2);cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--tr)}
.jdnav:hover{border-color:var(--b3);color:var(--t)}
.jbody{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:10px}
.jdiv{text-align:center;font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;padding:4px 0;font-weight:800}
.jmsg{max-width:74%;animation:fu .18s ease both}
.jmsg.mine{align-self:flex-end}
/* journal bubble — accent bg, always readable */
.jbubble{padding:10px 14px;border-radius:17px 17px 4px 17px;font-size:13px;line-height:1.6;font-weight:400;white-space:pre-wrap;word-break:break-word;background:var(--ac);color:#000}
[data-theme="light"] .jbubble{background:var(--ac);color:#fff}
.jbubble.edited-bubble::after{content:' (수정됨)';font-size:10px;opacity:.65;font-style:italic}
.jmeta{font-size:10px;color:var(--t2);margin-top:3px;display:flex;justify-content:flex-end;align-items:center;gap:7px}
.jact{color:var(--t3);cursor:pointer;opacity:0;font-size:11px;transition:opacity .12s;font-weight:700}
.jmsg:hover .jact{opacity:1}
.jact:hover{color:var(--bl)}
.jdel{color:var(--t3);cursor:pointer;opacity:0;font-size:11px;transition:opacity .12s;font-weight:700}
.jmsg:hover .jdel{opacity:1}
.jdel:hover{color:var(--rd)}
.jedit-area{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--t);font-family:var(--font);outline:none;resize:none;min-height:56px;line-height:1.5;transition:border-color .14s;margin-top:6px}
.jedit-area:focus{border-color:var(--ac)}
.jempty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.jia{border-top:1px solid var(--b);padding:11px 18px;background:var(--bg2);display:flex;gap:9px;align-items:flex-end}
.ji{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;padding:9px 15px;font-size:13px;color:var(--t);font-family:var(--font);outline:none;resize:none;min-height:38px;max-height:120px;line-height:1.5;transition:border-color .14s}
.ji:focus{border-color:var(--ac)}
.jsend{width:34px;height:34px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:var(--tr);flex-shrink:0;color:#000;font-weight:800}
.jsend:hover{opacity:.85;transform:scale(1.06)}

/* ══ SETTINGS ════════════════════════════════════════ */
.sview{padding:22px;overflow-y:auto;flex:1;max-width:560px}
.scard{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:13px}
.scard-t{font-size:12px;font-weight:800;color:var(--t);margin-bottom:12px}
.srow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}
.srow:last-child{border-bottom:none}
.slbl{flex:1;font-size:13px;color:var(--t2);font-weight:500}
.sinp{background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--t);font-family:var(--font);outline:none;width:160px;transition:border-color .13px}
.sinp:focus{border-color:var(--ac)}

/* ══ MODAL ════════════════════════════════════════════ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;display:none;align-items:center;justify-content:center;backdrop-filter:blur(7px)}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:22px;width:340px;max-width:94vw;animation:pop .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 24px 64px rgba(0,0,0,.5)}
.mt{font-size:18px;font-weight:800;margin-bottom:15px;color:var(--t)}
.mf{margin-bottom:10px}
.ml{font-size:9px;color:var(--t2);margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;font-weight:800}
.mi{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--t);font-family:var(--font);outline:none;transition:border-color .13s}
.mi:focus{border-color:var(--ac)}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:15px}
.mbtn{padding:8px 18px;border-radius:22px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;transition:var(--tr)}
.mbtn.ghost{background:var(--bg4);color:var(--t2)}.mbtn.ghost:hover{color:var(--t)}
.mbtn.ok{background:var(--ac);color:#000}.mbtn.ok:hover{opacity:.85}
.mbtn.danger{background:var(--rd2);color:var(--rd)}
.crow{display:flex;gap:5px;flex-wrap:wrap}
.csw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s}
.csw:hover{transform:scale(1.15)}.csw.sel{border-color:var(--t)}
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
  <div class="logo-row">
    <div class="logo-icon">🎯</div>
    <div style="flex:1">
      <div class="logo-text">DO <span class="it">IT</span></div>
      <div class="logo-sub">냅다 해버리기</div>
    </div>
    <button class="thbtn" id="thbtn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="nav-body">
    <div class="ni on" onclick="sv('today',this)"><span class="ico">🌤</span>오늘<span class="nbadge" id="bt">0</span></div>
    <div class="ni" onclick="sv('week',this)"><span class="ico">📅</span>이번 주<span class="nbadge" id="bw">0</span></div>
    <div class="ni" onclick="sv('all',this)"><span class="ico">≡</span>전체<span class="nbadge" id="ba">0</span></div>
    <div class="ni" onclick="sv('cal',this)"><span class="ico">▦</span>캘린더</div>
    <div class="ni" onclick="sv('habits',this)"><span class="ico">🔁</span>습관<span class="nbadge" id="bh">0</span></div>
    <div class="ni" onclick="sv('journal',this)"><span class="ico">✍️</span>일기</div>
    <div class="ns">폴더</div>
    <div class="fl" id="flist"></div>
  </div>
  <div class="sbfoot">
    <div class="sba" onclick="openCatMod()">＋ 폴더 추가</div>
    <div class="sba" onclick="sv('settings',null)">⚙ 설정</div>
  </div>
</aside>
<main class="main">
  <div class="topbar"><div class="ptitle" id="ptitle">오늘</div>
    <button class="btn primary" onclick="openAddTask()">＋ 추가</button>
  </div>
  <div class="content" id="con"></div>
</main>
</div>
<div class="ov" id="cmov">
<div class="modal">
  <div class="mt" id="cmod-t">폴더</div>
  <input type="hidden" id="cat-eid">
  <div class="mf"><div class="ml">이름</div><input class="mi" id="cname" placeholder="예: 업무, 공부, 운동"></div>
  <div class="mf"><div class="ml">색상</div><div class="crow" id="crow"></div></div>
  <div class="mact">
    <button class="mbtn ghost" onclick="closeOv('cmov')">취소</button>
    <button class="mbtn danger" id="cat-del-btn" onclick="delCatM()" style="display:none">삭제</button>
    <button class="mbtn ok" onclick="saveCat()">저장</button>
  </div>
</div>
</div>
<div id="pop-wrap"></div>

<script>
/* ════ CONSTANTS ════════════════════════════════════ */
const TODAY=new Date().toISOString().split('T')[0];
const NHR=new Date().getHours(),NMN=new Date().getMinutes();
function snapT(h,m){const s=Math.round(m/5)*5;return{h:h+(s>=60?1:0),m:s>=60?0:s};}
function toTS(h,m){return`${String(h%24).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}
function addM(ts,mins){const[h,m]=ts.split(':').map(Number);const t=h*60+m+mins;return toTS(Math.floor(t/60)%24,t%60);}
function ts2m(ts){if(!ts)return 0;const[h,m]=ts.split(':').map(Number);return h*60+m;}
function m2ts(m){return toTS(Math.floor(Math.max(0,m)/60)%24,Math.max(0,m)%60);}
function fmtDate(ds){if(!ds)return'날짜 선택';const d=new Date(ds+'T12:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일`;}
function fmtAP(ts){if(!ts)return'';const[h,m]=ts.split(':').map(Number);const ap=h<12?'오전':'오후';const h12=h===0?12:h>12?h-12:h;return`${ap} ${h12}:${String(m).padStart(2,'0')}`;}
const DKO=['일','월','화','수','목','금','토'];
const MKO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const HOTCOLS=['#b8ff00','#60a5fa','#f472b6','#34d399','#fb923c','#a78bfa','#f43f5e','#facc15','#22d3ee','#e879f9','#4ade80','#ff8c94','#38bdf8','#fbbf24','#c084fc'];
const SNAP=5;
const ROPS=[{k:'none',l:'없음'},{k:'daily',l:'매일'},{k:'weekdays',l:'평일'},{k:'weekly',l:'매주'},{k:'monthly',l:'매월'},{k:'yearly',l:'매년'}];

/* ════ STATE ════════════════════════════════════════ */
let S={tasks:[],habits:[],hl:{},cats:[],hvm:{},journal:{},settings:{priorities:['없음','급해','보통','여유'],theme:'dark'}};
let view='today',fcat=null,selTask=null;
let calDays=5,calStart=(()=>{let d=new Date();d.setHours(0,0,0,0);return d;})();
let miniMD=new Date(),jDate=TODAY;
let dragId=null,resizeId=null,resizeEdge=null,resizeStartY=0,resizeOrig={s:0,e:0};
let selcc=HOTCOLS[0];
let openPicker=null,dpY={},dpM2={};
let popId=null,popPicker=null,popDpY={},popDpM={};
let habitOpen={};
let dragSelStart=null,dragSelCells=new Set();
let editingJournalIdx=null;

/* ════ PERSIST ══════════════════════════════════════ */
function load(){
  ['tasks','habits','hl','cats','journal','settings'].forEach(k=>{try{const r=localStorage.getItem('doit10_'+k);if(r)S[k]=JSON.parse(r);}catch(e){}});
  if(!S.cats.length)S.cats=[{id:1,name:'개인',color:'#b8ff00'},{id:2,name:'업무',color:'#60a5fa'},{id:3,name:'공부',color:'#a78bfa'}];
  if(!S.settings)S.settings={priorities:['없음','급해','보통','여유'],theme:'dark'};
  if(!S.settings.priorities)S.settings.priorities=['없음','급해','보통','여유'];
  const th=S.settings.theme||'dark';
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('thbtn').textContent=th==='dark'?'🌙':'☀️';
}
function persist(){['tasks','habits','hl','cats','journal','settings'].forEach(k=>localStorage.setItem('doit10_'+k,JSON.stringify(S[k])));}

/* ════ ROUTING ══════════════════════════════════════ */
function sv(v,el){
  view=v;fcat=null;selTask=null;openPicker=null;closePopup();
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.fi').forEach(f=>f.classList.remove('on'));
  if(el)el.classList.add('on');
  const T={today:'오늘',week:'이번 주',all:'전체',cal:'캘린더',habits:'습관',journal:'일기',settings:'설정'};
  document.getElementById('ptitle').textContent=T[v]||v;
  render();
}
function setCatV(id){
  view='cat';fcat=id;selTask=null;openPicker=null;closePopup();
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.fi').forEach(f=>f.classList.toggle('on',f.dataset.cid==id));
  const c=S.cats.find(c=>c.id==id);document.getElementById('ptitle').textContent=c?c.name:'폴더';render();
}
function toggleTheme(){

/* ════ COLOR UTILS ══════════════════════════════════ */
function tfd(ds){return S.tasks.filter(t=>ton(t,ds));}
function ton(t,ds){
  if(t.repeat&&t.repeat!=='none')return repOn(t,ds);
  if(!t.start)return false;if(t.end)return t.start<=ds&&t.end>=ds;return t.start===ds;
}
function repOn(t,ds){
  if(!t.start||ds<t.start)return false;
  const d=new Date(ds+'T12:00:00');const dow=d.getDay();const day=d.getDate();
  switch(t.repeat){case'daily':return true;case'weekdays':return dow>=1&&dow<=5;
    case'weekly':return(t.weekdays||[]).includes(dow);case'monthly':return day===new Date(t.start+'T12:00:00').getDate();
    case'yearly':return ds.slice(5)===t.start.slice(5);default:return false;}
}
function gPL(p){return(S.settings.priorities||['없음','급해','보통','여유'])[p]||'';}
function gPC(p){return['transparent','var(--rd)','var(--yl)','var(--t2)'][p||0]||'transparent';}
function catCol(t){const c=S.cats.find(c=>c.id==t.catId);return c?c.color:null;}
function hex2rgba(hex,a){
  if(!hex||hex.startsWith('var'))return`rgba(100,100,100,${a})`;
  hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(x=>x+x).join('');
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return isNaN(r)?`rgba(100,100,100,${a})`:`rgba(${r},${g},${b},${a})`;
}
function bestTextCol(hex){
  if(!hex||hex.startsWith('var'))return'var(--t)';
  hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(x=>x+x).join('');
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return isNaN(r)?'var(--t)':(0.299*r+0.587*g+0.114*b)/255>0.55?'#000':'#fff';
}
function evStyle(t){
  const col=catCol(t)||(document.documentElement.getAttribute('data-theme')==='dark'?'#555':'#aab');
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const bg=hex2rgba(col,isDark?.42:.55);
  const textCol=bestTextCol(col);
  return{bg,textCol,col};
}
function rowStyle(t){
  const col=catCol(t);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  if(!col){const bg=isDark?'var(--bg3)':'var(--bg4)';return{bg,textCol:'var(--t)'};}
  const bg=hex2rgba(col,isDark?.28:.2);
  const textCol=isDark?'var(--t)':'var(--t)';
  return{bg,textCol};
}

function rendTasks(el){

  // inbox = tasks without start date that aren't recurring
  const nodate=S.tasks.filter(t=>!t.start&&!(t.repeat&&t.repeat!=='none')&&!t.done);

/* ════ DETAIL PANE ══════════════════════════════════ */
function rendDP(){
  if(!selTask)return`<div class="dp-empty"><div style="font-size:26px">◈</div><div style="font-size:13px;color:var(--t2)">할 일을 선택해봐</div></div>`;

  function mkTD(w){
    const cur=w==='stime'?t.stime:t.etime;const curM=cur?ts2m(cur):-1;
    const sm=w==='etime'&&t.stime?ts2m(t.stime):6*60;const em=w==='etime'?26*60:24*60;

    if(!dpY[w]){const d=new Date((t.start||TODAY)+'T12:00:00');dpY[w]=d.getFullYear();dpM2[w]=d.getMonth();}
    const yy=dpY[w],mm=dpM2[w];const dim=new Date(yy,mm+1,0).getDate(),fd=new Date(yy,mm,1).getDay();

    for(let d=1;d<=dim;d++){const ds=`${yy}-${String(mm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  }

      <div class="dp-field" onclick="togDP('start')"><span class="dp-f-ico">📅</span><span class="dp-f-lbl">시작</span><span class="dp-f-val ${!t.start?'ph':''}">${fmtDate(t.start)}</span></div>

    </div>

}

/* ════ CALENDAR ═════════════════════════════════════ */
function rendCal(el){
  const days=[];for(let i=0;i<calDays;i++){const d=new Date(calStart);d.setDate(d.getDate()+i);days.push(d);}

  const mmy=miniMD.getFullYear(),mmm=miniMD.getMonth();
  const mmdim=new Date(mmy,mmm+1,0).getDate(),mmfd=new Date(mmy,mmm,1).getDay();
  let mmC='';for(let i=0;i<mmfd;i++)mmC+=`<div class="mc-d mc-e"></div>`;
  for(let d=1;d<=mmdim;d++){
    const ds=`${mmy}-${String(mmm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inV=days.some(dy=>dy.toISOString().split('T')[0]===ds);const isT=ds===TODAY;

  let adrow=`<div class="wg-allday-label">종일</div>`;
  days.forEach(d=>{const ds=d.toISOString().split('T')[0];
    const ads=tfd(ds).filter(t=>!t.stime);const habs=habFD(ds);

      ${ads.map(t=>{const{bg,textCol,col}=evStyle(t);return`<div class="adchip ${t.done?'done-c':''}" draggable="true" data-tid="${t.id}"
        style="background:${bg};color:${textCol}" ondragstart="dStart(event,${t.id})" ondragend="dEnd(event)"
        onclick="event.stopPropagation();showPopup(${t.id},event.clientX-158,event.clientY+10)">${t.done?'✓ ':''}${t.text||'(제목 없음)'}</div>`;}).join('')}
      ${habs.map(h=>{const bg=hex2rgba(h.color||'34d399',.3);const tc=bestTextCol(h.color||'34d399');
        return`<div class="adchip" style="background:${bg};color:${tc}" draggable="true" data-hid="${h.id}"
          ondragstart="dStartHabit(event,${h.id},'${ds}')" ondragend="dEnd(event)"
          onclick="togHD(${h.id},'${ds}')">${h.done?'✓':'○'} ${h.name}</div>`;}).join('')}
    </div>`;});
  let rows='';
  for(let h=0;h<24;h++){
    rows+=`<div class="wg-tlabel">${h===0?'':h+':00'}</div>`;
    days.forEach(d=>{const ds=d.toISOString().split('T')[0];const ist=ds===TODAY;
      const dayEvs=tfd(ds).filter(t=>t.stime);
      const hourEvs=dayEvs.filter(t=>parseInt(t.stime.split(':')[0])===h);
      // habit events for this hour
      const habEvs=habFD(ds).filter(hb=>hb.stime&&parseInt(hb.stime.split(':')[0])===h);
      let evH=hourEvs.map(t=>{
        const mins=parseInt(t.stime.split(':')[1])||0;const top=Math.round(mins/60*48);
        let height=44;if(t.etime){const[eh,em]=t.etime.split(':').map(Number);height=Math.max(18,(eh*60+em-(h*60+mins))/60*48-2);}
        const{bg,textCol,col}=evStyle(t);
        const ovl=dayEvs.filter(o=>o.id!==t.id&&o.stime&&ts2m(o.stime)<ts2m(t.stime)+(height/48*60)&&ts2m(o.etime||addM(o.stime,30))>ts2m(t.stime));
        const isRight=ovl.length>0&&ovl[0].id<t.id;
        return`<div class="ev ${t.done?'done-e':''}" draggable="true" data-tid="${t.id}"
          style="top:${top}px;height:${height}px;left:${isRight?'50%':'2px'};right:${ovl.length>0&&!isRight?'50%':'2px'};background:${bg};color:${textCol}"
          ondragstart="dStart(event,${t.id})" ondragend="dEnd(event)"
          onclick="event.stopPropagation();showPopup(${t.id},event.clientX-158,event.clientY-50)">
          <div class="ev-rt" onmousedown="startResize(event,${t.id},'top')"></div>
          <div class="ev-time">${fmtAP(t.stime)}${t.etime?' – '+fmtAP(t.etime):''}</div>
          <div class="ev-txt">${t.text||'(제목 없음)'}</div>
          <div class="ev-rb" onmousedown="startResize(event,${t.id},'bot')"></div>
        </div>`;}).join('');
      // habit timed events
      evH+=habEvs.map(hb=>{
        const mins=parseInt(hb.stime.split(':')[1])||0;const top=Math.round(mins/60*48);
        let height=hb.etime?Math.max(18,(ts2m(hb.etime)-(h*60+mins))/60*48-2):44;
        const bg=hex2rgba(hb.color||'34d399',.35);const tc=bestTextCol(hb.color||'34d399');
        return`<div class="ev ev-habit ${hb.done?'done-e':''}" data-hid="${hb.id}" data-hds="${ds}"
          style="top:${top}px;height:${height}px;right:2px;left:2px;background:${bg};color:${tc};opacity:.9"
          onmousedown="startHabResize(event,${hb.id},'${ds}','bot')"
          onclick="event.stopPropagation();togHD(${hb.id},'${ds}')">
          <div class="ev-time">${hb.stime}${hb.etime?' – '+hb.etime:''}</div>
          <div class="ev-txt">${hb.done?'✓ ':''} ${hb.name}</div>
          <div class="ev-rb" onmousedown="startHabResize(event,${hb.id},'${ds}','bot')"></div>
        </div>`;}).join('');
      const nl=(ist&&h===NHR)?`<div class="nowline" style="top:${Math.round(NMN/60*48)}px"></div>`:'';
      rows+=`<div class="wg-cell ${ist?'tcol':''}" ondragover="cdov(event)" ondragleave="cdol(event)" ondrop="dropEV(event,'${ds}',${h})"
        onclick="cellClick(event,'${ds}',${h})"
        onmousedown="dragSelStart=null">${evH}${nl}</div>`;
    });
  }
  const ed=new Date(calStart);ed.setDate(ed.getDate()+calDays-1);
  el.innerHTML=`<div class="calview">
    <div class="calctrl">
      <button class="cnav" onclick="cnav(-1)">‹</button><button class="cnav" onclick="cnav(1)">›</button>
      <div class="caltitle">${calStart.getFullYear()}년 ${MKO[calStart.getMonth()]} ${calStart.getDate()}일 — ${ed.getDate()}일</div>
      <div class="dcbtns">
        <button class="dcb ${calDays===3?'on':''}" onclick="setCD(3)">3일</button>
        <button class="dcb ${calDays===5?'on':''}" onclick="setCD(5)">5일</button>
        <button class="dcb ${calDays===7?'on':''}" onclick="setCD(7)">7일</button>
      </div>
      <button class="btn sm" onclick="goToday()">오늘</button>
      <button class="btn primary sm" onclick="openAddTask()">＋</button>
    </div>
    <div class="wlayout">
      <div class="wleft">
        <div class="mini-cal">
          <div class="mc-hd"><button class="mc-nav" onclick="mmNav(-1)">‹</button><div class="mc-title">${mmy}년 ${MKO[mmm]}</div><button class="mc-nav" onclick="mmNav(1)">›</button></div>
          <div class="mc-grid">${DKO.map(d=>`<div class="mc-dl">${d}</div>`).join('')}${mmC}</div>
        </div>
        <div class="inbox-panel">
          <div class="inbox-hd"><div class="inbox-title">인박스 ${nodate.length}</div><button class="inbox-add" onclick="addInboxTask()">＋</button></div>
          <div style="font-size:10px;color:var(--t3);margin-bottom:7px;font-style:italic;line-height:1.5">드래그해서 날짜 배정</div>
          ${nodate.map(t=>{const{bg,textCol}=evStyle(t);return`<div class="ibi" draggable="true" data-tid="${t.id}" style="background:${bg};color:${textCol}"
            ondragstart="dStart(event,${t.id})" ondragend="dEnd(event)"
            onclick="showPopup(${t.id},event.clientX+5,event.clientY-50)"><div class="ibi-text">${t.text||'(제목 없음)'}</div></div>`;}).join('')}
        </div>
      </div>
      <div class="wgwrap" id="wgwrap">
        <div class="wgrid" id="wgrid" style="grid-template-columns:${gcols}">${hdr}${adrow}${rows}</div>
      </div>
    </div>
  </div>`;
  document.getElementById('wgwrap').scrollTop=Math.max(0,(NHR-1)*48);
}

function cellClick(e,ds,h){
  if(e.target.closest('.ev')||e.target.closest('.adchip'))return;
  const rect=e.currentTarget.getBoundingClientRect();
  const rel=Math.max(0,Math.min(47,e.clientY-rect.top));
  const snapped=Math.round(Math.round(rel/48*60)/SNAP)*SNAP;
  openAddTask(ds,`${String(h).padStart(2,'0')}:${String(snapped).padStart(2,'0')}`);
}
function jumpToDay(ds){calStart=new Date(ds+'T00:00:00');render();}
function mmNav(d){miniMD.setMonth(miniMD.getMonth()+d);render();}
function habFD(ds){
  return S.habits.filter(h=>{if(!h.activeDays||!h.activeDays.length)return false;return h.activeDays.includes(new Date(ds+'T12:00:00').getDay());})
    .map(h=>({...h,done:!!S.hl[`${h.id}_${ds}`]}));
}
function togHD(hid,ds){if(ds>TODAY)return;S.hl[`${hid}_${ds}`]=!S.hl[`${hid}_${ds}`];persist();render();}
function cnav(d){calStart.setDate(calStart.getDate()+d*calDays);render();}
function setCD(n){calDays=n;render();}
function goToday(){calStart=new Date();calStart.setHours(0,0,0,0);miniMD=new Date();render();}

// drag
function dStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.querySelectorAll(`[data-tid="${id}"]`).forEach(el=>el.classList.add('dragging')),0);}
function dStartHabit(e,hid,ds){e.dataTransfer.setData('hid',`${hid}_${ds}`);}
function dEnd(){document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));}
function cdov(e){e.preventDefault();e.currentTarget.classList.add('dover');}
function cdol(e){e.currentTarget.classList.remove('dover');}
function dropAD(e,ds){e.preventDefault();e.currentTarget.classList.remove('dover');if(dragId==null)return;const t=S.tasks.find(t=>t.id==dragId);if(t){t.start=ds;t.end=ds;t.stime=null;t.etime=null;}dragId=null;persist();render();}
function dropEV(e,ds,h){
  e.preventDefault();e.currentTarget.classList.remove('dover');if(dragId==null)return;
  const t=S.tasks.find(t=>t.id==dragId);
  if(t){let dur=0;if(t.stime&&t.etime)dur=ts2m(t.etime)-ts2m(t.stime);
    t.start=ds;t.end=ds;const rect=e.currentTarget.getBoundingClientRect();
    const rel=Math.max(0,Math.min(47,e.clientY-rect.top));
    const snapped=Math.round(Math.round(rel/48*60)/SNAP)*SNAP;
    t.stime=toTS(h,snapped);if(dur>0)t.etime=addM(t.stime,dur);}
  dragId=null;persist();render();
}

// resize tasks
function startResize(e,id,edge){e.stopPropagation();e.preventDefault();const t=S.tasks.find(t=>t.id==id);if(!t)return;resizeId=id;resizeEdge=edge;resizeStartY=e.clientY;resizeOrig={s:t.stime?ts2m(t.stime):NHR*60+NMN,e:t.etime?ts2m(t.etime):NHR*60+NMN+30};document.addEventListener('mousemove',onResize);document.addEventListener('mouseup',stopResize);}
function onResize(e){if(resizeId==null)return;const t=S.tasks.find(t=>t.id==resizeId);if(!t)return;const dy=e.clientY-resizeStartY;const dm=Math.round(dy/48*60/SNAP)*SNAP;if(resizeEdge==='bot')t.etime=m2ts(Math.max(resizeOrig.s+15,resizeOrig.e+dm));else t.stime=m2ts(Math.min(resizeOrig.e-15,resizeOrig.s+dm));persist();const evEl=document.querySelector(`.ev[data-tid="${resizeId}"]`);if(evEl&&t.stime){const h=parseInt(t.stime.split(':')[0]);const ms=parseInt(t.stime.split(':')[1])||0;const top=Math.round(ms/60*48);evEl.style.top=top+'px';if(t.etime){const[eh,em]=t.etime.split(':').map(Number);evEl.style.height=Math.max(18,(eh*60+em-(h*60+ms))/60*48-2)+'px';}const tEl=evEl.querySelector('.ev-time');if(tEl)tEl.textContent=`${fmtAP(t.stime)}${t.etime?' – '+fmtAP(t.etime):''}`; }}
function stopResize(){resizeId=null;document.removeEventListener('mousemove',onResize);document.removeEventListener('mouseup',stopResize);}

// habit resize (drag bottom handle to set etime)
let habResizeId=null,habResizeDs=null,habResizeStartY=0,habResizeOrigE=0,habResizeOrigS=0;
function startHabResize(e,hid,ds,edge){
  e.stopPropagation();e.preventDefault();
  const hb=S.habits.find(h=>h.id==hid);if(!hb)return;
  habResizeId=hid;habResizeDs=ds;habResizeStartY=e.clientY;
  habResizeOrigS=hb.stime?ts2m(hb.stime):0;
  habResizeOrigE=hb.etime?ts2m(hb.etime):habResizeOrigS+30;
  document.addEventListener('mousemove',onHabResize);document.addEventListener('mouseup',stopHabResize);
}
function onHabResize(e){
  if(!habResizeId)return;const hb=S.habits.find(h=>h.id==habResizeId);if(!hb)return;
  const dy=e.clientY-habResizeStartY;const dm=Math.round(dy/48*60/SNAP)*SNAP;
  hb.etime=m2ts(Math.max(habResizeOrigS+15,habResizeOrigE+dm));
  persist();
  const evEl=document.querySelector(`.ev-habit[data-hid="${habResizeId}"][data-hds="${habResizeDs}"]`);
  if(evEl&&hb.stime){const h=parseInt(hb.stime.split(':')[0]);const ms=parseInt(hb.stime.split(':')[1])||0;if(hb.etime){const[eh,em]=hb.etime.split(':').map(Number);evEl.style.height=Math.max(18,(eh*60+em-(h*60+ms))/60*48-2)+'px';}const tEl=evEl.querySelector('.ev-time');if(tEl)tEl.textContent=`${hb.stime}${hb.etime?' – '+hb.etime:''}`;}
}
function stopHabResize(){habResizeId=null;document.removeEventListener('mousemove',onHabResize);document.removeEventListener('mouseup',stopHabResize);}

/* ════ HABITS ═══════════════════════════════════════ */
function rendHabits(el){
  const NOW=new Date();
  let h=`<div class="hview"><div class="habar"><input class="hinp" id="hinp" type="text" placeholder="새 습관 추가..." onkeydown="if(event.key==='Enter')addHabit()"><button class="btn primary" onclick="addHabit()">추가</button></div>`;
  if(!S.habits.length)h+=`<div class="empty"><div style="font-size:22px">🔁</div><div style="font-size:13px;color:var(--t2);margin-top:6px">습관을 추가해봐!</div></div>`;
  else S.habits.forEach(hb=>{
    if(!S.hvm[hb.id])S.hvm[hb.id]={y:NOW.getFullYear(),m:NOW.getMonth()};
    const{y,m}=S.hvm[hb.id];const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,1).getDay();
    const lim=(y===NOW.getFullYear()&&m===NOW.getMonth())?NOW.getDate():dim;
    let done=0;for(let d=1;d<=lim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(S.hl[`${hb.id}_${ds}`])done++;}
    const pct=lim>0?Math.round(done/lim*100):0;const isc=y===NOW.getFullYear()&&m===NOW.getMonth();
    const isOpen=!!habitOpen[hb.id];
    let lbls=DKO.map(d=>`<div class="hgl">${d}</div>`).join('');let cells='';
    for(let i=0;i<fd;i++)cells+=`<div class="hgd hemp"></div>`;
    for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isA=(hb.activeDays||[]).includes(new Date(ds+'T12:00:00').getDay());
      const ok=!!S.hl[`${hb.id}_${ds}`];const ito=ds===TODAY,ifu=ds>TODAY;
      cells+=`<div class="hgd ${ok?'hdone':''}${ito?' htoday':''}${!isA||ifu?' hfut':''}" ${!ifu&&isA?`onclick="togHD(${hb.id},'${ds}')"`:''}  style="opacity:${isA?1:.12}"></div>`;}
    h+=`<div class="hcard">
      <div class="hcard-hd" onclick="togHabitOpen(${hb.id})">
        <span class="hcard-arrow ${isOpen?'open':''}">▶</span>
        <span class="hcard-name">${hb.name}</span>
        <div class="hcard-bar"><div class="hcard-bar-fill" style="width:${pct}%"></div></div>
        <span class="hcard-pct">${pct}%</span>
        <span style="font-size:11px;color:var(--t2);margin-right:6px">${done}/${lim}일</span>
        <button class="hcard-del" onclick="event.stopPropagation();delH(${hb.id})">✕</button>
      </div>
      <div class="hcard-body ${isOpen?'':'collapsed'}">
        <div class="hcdays">${DKO.map((d,i)=>`<span class="hcday ${(hb.activeDays||[]).includes(i)?'on':''}" onclick="togHA(${hb.id},${i})">${d}</span>`).join('')}</div>
        <div class="hmnav"><button class="hmbtn" onclick="hNav(${hb.id},-1)">‹</button><span class="hmtitle">${y}년 ${MKO[m]}</span>${!isc?`<button class="hmbtn" onclick="hNav(${hb.id},1)">›</button>`:''}</div>
        <div class="hgrid">${lbls}${cells}</div>
      </div>
    </div>`;
  });
  h+=`</div>`;el.innerHTML=h;
}
function togHabitOpen(id){habitOpen[id]=!habitOpen[id];rendHabits(document.getElementById('con'));}
function addHabit(){const i=document.getElementById('hinp');if(!i)return;const v=i.value.trim();if(!v)return;const hb={id:Date.now(),name:v,activeDays:[1,2,3,4,5],stime:null,etime:null};S.habits.push(hb);S.hvm[hb.id]={y:new Date().getFullYear(),m:new Date().getMonth()};habitOpen[hb.id]=true;i.value='';persist();render();}
function delH(id){S.habits=S.habits.filter(h=>h.id!=id);delete habitOpen[id];persist();render();}
function togHA(hid,i){const h=S.habits.find(h=>h.id==hid);if(!h)return;if(!h.activeDays)h.activeDays=[];if(h.activeDays.includes(i))h.activeDays=h.activeDays.filter(x=>x!==i);else h.activeDays.push(i);persist();render();}
function hNav(hid,d){if(!S.hvm[hid])S.hvm[hid]={y:new Date().getFullYear(),m:new Date().getMonth()};let{y,m}=S.hvm[hid];m+=d;if(m<0){m=11;y--;}if(m>11){m=0;y++;}S.hvm[hid]={y,m};render();}

/* ════ JOURNAL ══════════════════════════════════════ */
function rendJournal(el){
  const entries=S.journal[jDate]||[];const d=new Date(jDate+'T12:00:00');
  const dLabel=`${d.getFullYear()}년 ${MKO[d.getMonth()]} ${d.getDate()}일 (${DKO[d.getDay()]})`;
  let msgsH=entries.length?`<div class="jdiv">${dLabel}</div>`+entries.map((e,i)=>{
    if(editingJournalIdx===i){
      return`<div class="jmsg mine">
        <textarea class="jedit-area" id="jedit-${i}" rows="3">${esc(e.text)}</textarea>
        <div class="jmeta">
          <span class="jact" style="opacity:1" onclick="saveJournalEdit(${i})">저장</span>
          <span class="jact" style="opacity:1" onclick="cancelJEdit()">취소</span>
        </div>
      </div>`;
    }
    return`<div class="jmsg mine">
      <div class="jbubble ${e.edited?'edited-bubble':''}">${esc(e.text)}</div>
      <div class="jmeta">
        <span class="jact" onclick="startJEdit(${i},'${jDate}')">수정</span>
        <span class="jdel" onclick="delJ('${jDate}',${i})">삭제</span>
        <span>${e.time}${e.edited?' · 수정됨':''}</span>
      </div>
    </div>`;
  }).join(''):`<div class="jempty"><div style="font-size:22px">✍️</div><div style="font-size:13px;color:var(--t2);margin-top:6px">오늘 하루 어땠어?</div></div>`;
  el.innerHTML=`<div class="jview"><div class="jheader"><button class="jdnav" onclick="jNav(-1)">‹</button>
    <div style="flex:1"><div style="font-size:15px;font-weight:800">${dLabel}</div>${jDate===TODAY?`<div style="font-size:10px;color:var(--ac);font-weight:700;margin-top:1px">오늘</div>`:''}</div>
    ${jDate!==TODAY?`<button class="jdnav" onclick="jNav(1)">›</button>`:'<div style="width:26px"></div>'}
  </div>
  <div class="jbody" id="jmsgs">${msgsH}</div>
  <div class="jia"><textarea class="ji" id="ji" placeholder="오늘 있었던 일, 생각, 기분..." rows="1" onkeydown="jKD(event)" oninput="jRS(this)"></textarea><button class="jsend" onclick="sendJ()">↑</button></div></div>`;
  setTimeout(()=>{const m=document.getElementById('jmsgs');if(m)m.scrollTop=m.scrollHeight;},50);
}
function startJEdit(idx,date){editingJournalIdx=idx;rendJournal(document.getElementById('con'));setTimeout(()=>{const ta=document.getElementById(`jedit-${idx}`);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);}
function saveJournalEdit(idx){
  const ta=document.getElementById(`jedit-${idx}`);if(!ta)return;
  const txt=ta.value.trim();if(!txt)return;
  if(!S.journal[jDate])return;
  S.journal[jDate][idx].text=txt;S.journal[jDate][idx].edited=true;
  editingJournalIdx=null;persist();rendJournal(document.getElementById('con'));
}
function cancelJEdit(){editingJournalIdx=null;rendJournal(document.getElementById('con'));}
function jKD(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendJ();}}
function jRS(el){el.style.height='auto';el.style.height=Math.min(120,el.scrollHeight)+'px';}
function sendJ(){const inp=document.getElementById('ji');if(!inp)return;const txt=inp.value.trim();if(!txt)return;if(!S.journal[jDate])S.journal[jDate]=[];const now=new Date();S.journal[jDate].push({text:txt,time:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,edited:false});inp.value='';inp.style.height='auto';persist();rendJournal(document.getElementById('con'));}
function delJ(date,idx){if(!S.journal[date])return;S.journal[date].splice(idx,1);persist();render();}
function jNav(d){const dt=new Date(jDate+'T12:00:00');dt.setDate(dt.getDate()+d);const nd=dt.toISOString().split('T')[0];if(nd>TODAY)return;jDate=nd;render();}

/* ════ SETTINGS ══════════════════════════════════════ */
function rendSettings(el){
  const p=S.settings.priorities||['없음','급해','보통','여유'];
  el.innerHTML=`<div class="sview"><div style="font-size:18px;font-weight:800;margin-bottom:16px">설정</div>
    <div class="scard"><div class="scard-t">우선순위 워딩</div>${[1,2,3].map(i=>`<div class="srow"><div class="slbl">${['급한 것 🔴','보통 🟡','여유로운 것 ⚪'][i-1]}</div><input class="sinp" id="prio-${i}" value="${p[i]||''}"></div>`).join('')}<div style="margin-top:11px;display:flex;justify-content:flex-end"><button class="btn primary" onclick="savePrios()">저장</button></div></div>
    <div class="scard"><div class="scard-t">폴더 관리</div>${S.cats.map(c=>`<div class="srow"><span class="fdot" style="background:${c.color};width:10px;height:10px;border-radius:50%"></span><input class="sinp" style="flex:1;margin:0 8px" value="${c.name}" onchange="renameF(${c.id},this.value)"><div class="crow" style="gap:3px">${HOTCOLS.map(col=>`<div class="csw ${col===c.color?'sel':''}" style="background:${col};width:17px;height:17px" onclick="setFC(${c.id},'${col}')"></div>`).join('')}</div><button class="btn sm danger" style="margin-left:7px" onclick="delFById(${c.id})">삭제</button></div>`).join('')}</div>
    <div class="scard"><div class="scard-t">데이터</div>
      <div class="srow"><div class="slbl">✅ 로컬 자동 저장 — 새로고침·재배포해도 데이터 유지</div></div>
      <div class="srow"><div class="slbl">Vercel 배포: index.html → GitHub → vercel.com</div></div>
      <div class="srow"><div class="slbl" style="color:var(--rd)">전체 초기화</div><button class="btn sm danger" onclick="resetAll()">초기화</button></div>
    </div>
  </div>`;
}
function savePrios(){[1,2,3].forEach(i=>{const v=document.getElementById('prio-'+i)?.value.trim();if(v)S.settings.priorities[i]=v;});persist();render();}
function renameF(id,n){const c=S.cats.find(c=>c.id==id);if(c)c.name=n;persist();rendSidebar();}
function setFC(id,col){const c=S.cats.find(c=>c.id==id);if(c)c.color=col;persist();render();}
function delFById(id){if(!confirm('폴더 삭제할게.'))return;S.cats=S.cats.filter(c=>c.id!=id);S.tasks.forEach(t=>{if(t.catId==id)t.catId=null;});persist();render();}
function resetAll(){if(!confirm('진짜 다 지울거야?'))return;['tasks','habits','hl','journal'].forEach(k=>S[k]=k==='hl'||k==='journal'?{}:[]);persist();render();}

/* ════ CAT MODAL ════════════════════════════════════ */
function openCatMod(){document.getElementById('cat-eid').value='';document.getElementById('cname').value='';document.getElementById('cmod-t').textContent='폴더 추가';document.getElementById('cat-del-btn').style.display='none';selcc=HOTCOLS[0];rendCrow();document.getElementById('cmov').classList.add('open');setTimeout(()=>document.getElementById('cname').focus(),60);}
function openEditCat(id){const c=S.cats.find(c=>c.id==id);if(!c)return;document.getElementById('cat-eid').value=id;document.getElementById('cname').value=c.name;document.getElementById('cmod-t').textContent='폴더 수정';document.getElementById('cat-del-btn').style.display='';selcc=c.color;rendCrow();document.getElementById('cmov').classList.add('open');}
function rendCrow(){document.getElementById('crow').innerHTML=HOTCOLS.map(col=>`<div class="csw ${col===selcc?'sel':''}" style="background:${col}" onclick="pickC(this,'${col}')"></div>`).join('');}
function pickC(el,c){selcc=c;document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function saveCat(){const n=document.getElementById('cname').value.trim();if(!n)return;const eid=document.getElementById('cat-eid').value;if(eid){const c=S.cats.find(c=>c.id==eid);if(c){c.name=n;c.color=selcc;}}else S.cats.push({id:Date.now(),name:n,color:selcc});closeOv('cmov');persist();render();}
function delCatM(){const eid=document.getElementById('cat-eid').value;if(!eid)return;if(!confirm('폴더 삭제할게요?'))return;S.cats=S.cats.filter(c=>c.id!=eid);S.tasks.forEach(t=>{if(t.catId==eid)t.catId=null;});closeOv('cmov');persist();render();}

/* ════ UTILS ════════════════════════════════════════ */
function closeOv(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('click',e=>{
  if(!e.target.closest('#evpop')&&!e.target.closest('.ev')&&!e.target.closest('.adchip')&&!e.target.closest('.ibi')&&!e.target.closest('.inbox-add'))closePopup();
  if(!e.target.closest('.dp-field')&&!e.target.closest('.tdrop')&&!e.target.closest('.datepan')){if(openPicker){openPicker=null;rerDP();}}
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('open'));closePopup();openPicker=null;}
  if(e.key==='n'&&!e.target.closest('input,select,textarea,button'))openAddTask();
  // Cmd/Ctrl+Backspace in detail pane = delete
  if((e.metaKey||e.ctrlKey)&&e.key==='Backspace'&&selTask&&!e.target.closest('input,select,textarea')){e.preventDefault();if(confirm('이 할 일을 삭제할까요?'))delTask(selTask);}
});
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

load();render();
</script>
</body>
